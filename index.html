<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tambola Number Board</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #141e30, #243b55);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    h1 {
      margin-bottom: 15px;
      font-size: 2.8rem;
      letter-spacing: 1px;
      text-align: center;
    }

    .top-section {
      width: 100%;
      max-width: 1200px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-bottom: 25px;
    }

    .current-number-box {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 25px;
      width: 280px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    .current-number-box h2 {
      font-size: 1.2rem;
      margin-bottom: 10px;
      opacity: 0.8;
    }

    .current-number {
      font-size: 5rem;
      font-weight: bold;
      color: #ffd54f;
      text-shadow: 0 0 15px rgba(255, 213, 79, 0.6);
    }

    .controls {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 15px;
    }

    button {
      padding: 14px 24px;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .next-btn {
      background: linear-gradient(135deg, #00c853, #00e676);
      color: white;
      box-shadow: 0 5px 20px rgba(0, 230, 118, 0.3);
    }

    .next-btn:hover {
      transform: translateY(-2px);
    }

    .clear-btn {
      background: linear-gradient(135deg, #d50000, #ff1744);
      color: white;
      box-shadow: 0 5px 20px rgba(255, 23, 68, 0.3);
    }

    .clear-btn:hover {
      transform: translateY(-2px);
    }

    .board {
      width: 100%;
      max-width: 1200px;
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 10px;
    }

    .cell {
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      height: 75px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-weight: bold;
      transition: all 0.3s ease;
      user-select: none;
    }

    .cell.marked {
      background: linear-gradient(135deg, #ff9800, #ff5722);
      color: white;
      transform: scale(1.03);
      box-shadow: 0 0 18px rgba(255, 87, 34, 0.5);
      text-decoration: line-through;
    }

    .history {
      margin-top: 25px;
      width: 100%;
      max-width: 1200px;
      background: rgba(255,255,255,0.08);
      border-radius: 15px;
      padding: 20px;
    }

    .history h3 {
      margin-bottom: 12px;
    }

    .history-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .history-item {
      background: rgba(255,255,255,0.12);
      padding: 8px 12px;
      border-radius: 8px;
      font-weight: bold;
    }

    @media (max-width: 768px) {
      .board {
        grid-template-columns: repeat(5, 1fr);
      }

      .cell {
        height: 60px;
        font-size: 1.2rem;
      }

      .current-number {
        font-size: 4rem;
      }
    }
  </style>
</head>

<body>

  <h1>🎲 Tambola Number Board</h1>

  <div class="top-section">

    <div class="current-number-box">
      <h2>Current Number</h2>
      <div class="current-number" id="currentNumber">--</div>
    </div>

    <div class="controls">
      <button class="next-btn" onclick="generateNextNumber()">
        ▶ Next Number
      </button>

      <button class="clear-btn" onclick="clearBoard()">
        🗑 Clear Board
      </button>
    </div>

  </div>

  <div class="board" id="board"></div>

  <div class="history">
    <h3>📜 Called Numbers</h3>
    <div class="history-list" id="historyList"></div>
  </div>

  <script>
    const board = document.getElementById("board");
    const currentNumberEl = document.getElementById("currentNumber");
    const historyList = document.getElementById("historyList");

    let calledNumbers = JSON.parse(localStorage.getItem("tambolaCalledNumbers")) || [];
    let currentNumber = localStorage.getItem("tambolaCurrentNumber") || "--";

    // Create board
    function createBoard() {
      board.innerHTML = "";

      for (let i = 1; i <= 90; i++) {
        const cell = document.createElement("div");
        cell.classList.add("cell");
        cell.id = "cell-" + i;
        cell.textContent = i;

        if (calledNumbers.includes(i)) {
          cell.classList.add("marked");
        }

        board.appendChild(cell);
      }
    }

    // Update history
    function updateHistory() {
      historyList.innerHTML = "";

      calledNumbers.forEach(num => {
        const item = document.createElement("div");
        item.classList.add("history-item");
        item.textContent = num;
        historyList.appendChild(item);
      });
    }

    // Speak number
    function speakNumber(number) {
      const speech = new SpeechSynthesisUtterance(`Number ${number}`);
      speech.lang = "en-US";
      speech.rate = 0.8;
      speech.pitch = 1;

      // Voice selection
      const voices = window.speechSynthesis.getVoices();
      const preferredVoice = voices.find(v =>
        v.name === "Google US English"
        // Google --> Male
        // Google US English --> Female
      );

      if (preferredVoice) {
        speech.voice = preferredVoice;
      }

      window.speechSynthesis.speak(speech);
    }

    // Generate random number
    function generateNextNumber() {

      if (calledNumbers.length >= 90) {
        alert("All numbers have been generated!");
        return;
      }

      let randomNumber;

      do {
        randomNumber = Math.floor(Math.random() * 90) + 1;
      } while (calledNumbers.includes(randomNumber));

      calledNumbers.push(randomNumber);
      currentNumber = randomNumber;

      document.getElementById("cell-" + randomNumber)
        .classList.add("marked");

      currentNumberEl.textContent = randomNumber;

      localStorage.setItem(
        "tambolaCalledNumbers",
        JSON.stringify(calledNumbers)
      );

      localStorage.setItem(
        "tambolaCurrentNumber",
        currentNumber
      );

      updateHistory();
      speakNumber(randomNumber);
    }

    // Clear board
    function clearBoard() {

      const confirmClear = confirm(
        "Are you sure you want to clear the board and restart the game?"
      );

      if (!confirmClear) return;

      calledNumbers = [];
      currentNumber = "--";

      localStorage.removeItem("tambolaCalledNumbers");
      localStorage.removeItem("tambolaCurrentNumber");

      currentNumberEl.textContent = "--";

      createBoard();
      updateHistory();

      window.speechSynthesis.cancel();
    }

    // Load saved game
    function loadGame() {
      currentNumberEl.textContent = currentNumber;
      createBoard();
      updateHistory();
    }

    // Load voices properly
    speechSynthesis.onvoiceschanged = () => {
      speechSynthesis.getVoices();
    };

    document.addEventListener("keydown", function(event) {
      console.log(event.key);
      if (event.key === "PageDown") {
        generateNextNumber();
      }
    });

    loadGame();
  </script>

</body>
</html>
